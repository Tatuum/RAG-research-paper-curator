services:
  postgres:
    image: postgres:16-alpine
    container_name: rag-paper-postgres
    environment:
      - POSTGRES_DB=rag_paper_db
      - POSTGRES_USER=rag_paper_user
      - POSTGRES_PASSWORD=rag_paper_password
      - POSTGRES_HOST_AUTH_METHOD=password
      - PGDATA=/var/lib/postgresql/data/pgdata
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag_paper_user -d rag_paper_db"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag-paper-network
  opensearch:
    image: opensearchproject/opensearch:2.19.0
    container_name: rag-paper-opensearch
    environment:
      - discovery.type=single-node
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - DISABLE_SECURITY_PLUGIN=true
      - bootstrap.memory_lock=true
    ports:
      - "9201:9200"
      - "9601:9600"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped
    networks:
      - rag-paper-network

volumes:
  postgres_data:
  opensearch_data:

networks:
  rag-paper-network:
    driver: bridge
